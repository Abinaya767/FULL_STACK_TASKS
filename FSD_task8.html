<!DOCTYPE html>
<html>
<head>
    <title>Abi'ssss Food Corner</title>

    <style>
        body{
            font-family: Arial;
            background-color: #fff8dc;
            text-align: center;
        }

        .container{
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .food{
            border: 2px solid orange;
            padding: 15px;
            width: 220px;
            background-color: white;
            border-radius: 10px;
        }

        img{
            width: 200px;
            height: 150px;
            border-radius: 10px;
        }

        button{
            background-color: red;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover{
            background-color: darkgreen;
        }
    </style>

    <script>
        function buy(food, price){
            alert("Order Placed Successfully!\n\nItem: " + food +
                  "\nAmount: ₹" + price);
        }
    </script>
</head>

<body>

<h1>🍔Welcome to Abi'ssss Food Corner</h1>
<h3>Order Your Favorite Food</h3>

<div class="container">

    <div class="food">
        <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400" alt="Pizza">
        <h2>Pizza</h2>
        <p>Price: ₹250</p>
        <button onclick="buy('Pizza',250)">Buy Now</button>
    </div>

    <div class="food">
        <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400" alt="Burger">
        <h2>Burger</h2>
        <p>Price: ₹180</p>
        <button onclick="buy('Burger',180)">Buy Now</button>
    </div>

    <div class="food">
        <img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?w=400" alt="Biryani">
        <h2>Biryani</h2>
        <p>Price: ₹220</p>
        <button onclick="buy('Biryani',220)">Buy Now</button>
    </div>

</div>

</body>
</html>
