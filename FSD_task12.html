<!DOCTYPE html>
<html>
<head>
<title>Travel Community Signup</title>

<style>
body{
    font-family:Arial;
    background-color:#eef4f8;
}

h1,h3{
    text-align:center;
    color:#003049;
}

.container{
    width:900px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:2px 2px 10px gray;
}

.box{
    display:inline-block;
    width:42%;
    vertical-align:top;
    margin:15px;
}

input,select{
    width:95%;
    padding:8px;
    margin-top:5px;
    margin-bottom:12px;
}

.email-box{
    width:95%;
    margin:auto;
}

button{
    width:100%;
    padding:12px;
    background-color:#005f73;
    color:white;
    border:none;
    font-size:16px;
    border-radius:5px;
}
</style>

</head>

<body>

<h1>✈️ Wander World Travel Community</h1>

<h3>Complete your profile and start exploring the world with us!</h3>

<div class="container">

    <!-- Left Side -->
    <div class="box">

        <label>Full Name</label><br>
        <input type="text" placeholder="Enter your name">

        <label>Age</label><br>
        <input type="number" placeholder="Enter your age">

        <label>Date of Birth</label><br>
        <input type="date">

        <label>Gender</label><br>
        <select>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>

    </div>


    <!-- Right Side -->
    <div class="box">

        <label>Dream Destination</label><br>
        <input type="text" placeholder="Example: Switzerland">

        <label>Travel Style</label><br>
        <select>
            <option>Adventure</option>
            <option>Luxury</option>
            <option>Beach Vacation</option>
            <option>Historical Tours</option>
            <option>Wildlife Safari</option>
        </select>

        <label>Estimated Budget (₹)</label><br>
        <input type="number" placeholder="50000">

        <label>Passport Number</label><br>
        <input type="text" placeholder="Enter passport number">

    </div>


    <!-- Email at the End -->
    <div class="email-box">

        <label>Email Address</label><br>
        <input type="email"
        placeholder="yourname@example.com">

        <br><br>

        <button>Join The Community</button>

    </div>

</div>

</body>
</html>
